# Midterm exam coverage summary (based on 2020-2025 exams)
exam_coverage:
  recurring_tf_topics:
    - "Linearity: homogeneity + additivity (both required)"
    - "Convolution (time domain) vs multiplication (frequency domain)"
    - "State vector dimension = p * n"
    - "Structural damping: valid ONLY for harmonic excitation"
    - "Gyroscopic matrix is skew-symmetric, does NO work"
    - "Modal superposition is EXACT for proportional damping"
    - "Mass normalization: U^T M U = I"
    - "Bi-orthogonality for asymmetric systems"
    - "Left vs right eigenvectors for nonproportional/gyroscopic systems"
    - "Stability: Re(lambda) < 0 for asymptotic stability"

  recurring_calculation_types:
    - "FRF decomposition: 3rd order → 1st + 2nd order partial fractions"
    - "Lagrange EOM for rotating systems (hoop, triangle, bead)"
    - "Equilibrium + linearization + stability chain"
    - "2-DOF symmetric EVP + mass normalization"
    - "Proportional damping: modal decoupling + damped response"
    - "State-space formulation for gyroscopic system"
